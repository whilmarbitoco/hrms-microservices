services:

  # ── RabbitMQ ───────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    networks:
      - dokploy-network
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Auth Microservice ───────────────────────────────────────────────────────
  auth-ms:
    build:
      context: ./auth-ms
    networks:
      - dokploy-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: ${AUTH_DB_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TALISMAN_FORCE_HTTPS: "false"
    restart: unless-stopped

  # ── Employee Microservice ───────────────────────────────────────────────────
  employee-ms:
    build:
      context: ./employee-ms
    networks:
      - dokploy-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: ${EMPLOYEE_DB_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TALISMAN_FORCE_HTTPS: "false"
    restart: unless-stopped

  # ── Payroll Microservice ────────────────────────────────────────────────────
  payroll-ms:
    build:
      context: ./payroll-ms
    networks:
      - dokploy-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: ${PAYROLL_DB_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TALISMAN_FORCE_HTTPS: "false"
    restart: unless-stopped

  # ── Leave Microservice ──────────────────────────────────────────────────────
  leave-ms:
    build:
      context: ./leave-ms
    networks:
      - dokploy-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: ${LEAVE_DB_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TALISMAN_FORCE_HTTPS: "false"
    restart: unless-stopped

volumes:
  rabbitmq_data:

networks:
  dokploy-network:
    external: true
