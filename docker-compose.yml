services:

  # ── RabbitMQ ───────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    networks:
      - dokploy-network
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Auth Microservice ───────────────────────────────────────────────────────
  auth-ms:
    build:
      context: ./auth-ms
    networks:
      - dokploy-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: ${AUTH_DB_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TALISMAN_FORCE_HTTPS: "false"
      FORCE_MIGRATE: ${FORCE_MIGRATE:-false}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.swarm.enable=false"
      - "traefik.http.routers.auth-ms.rule=Host(`hrms-api.whilmarbitoco.qzz.io`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.auth-ms.entrypoints=websecure"
      - "traefik.http.routers.auth-ms.tls.certresolver=letsencrypt"
      - "traefik.http.services.auth-ms.loadbalancer.server.port=8000"

  # ── Employee Microservice ───────────────────────────────────────────────────
  employee-ms:
    build:
      context: ./employee-ms
    networks:
      - dokploy-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: ${EMPLOYEE_DB_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TALISMAN_FORCE_HTTPS: "false"
      FORCE_MIGRATE: ${FORCE_MIGRATE:-false}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.swarm.enable=false"
      - "traefik.http.routers.employee-ms.rule=Host(`hrms-api.whilmarbitoco.qzz.io`) && (PathPrefix(`/employees`) || PathPrefix(`/departments`) || PathPrefix(`/employee-roles`))"
      - "traefik.http.routers.employee-ms.entrypoints=websecure"
      - "traefik.http.routers.employee-ms.tls.certresolver=letsencrypt"
      - "traefik.http.services.employee-ms.loadbalancer.server.port=8000"

  # ── Payroll Microservice ────────────────────────────────────────────────────
  payroll-ms:
    build:
      context: ./payroll-ms
    networks:
      - dokploy-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: ${PAYROLL_DB_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TALISMAN_FORCE_HTTPS: "false"
      FORCE_MIGRATE: ${FORCE_MIGRATE:-false}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.swarm.enable=false"
      - "traefik.http.routers.payroll-ms.rule=Host(`hrms-api.whilmarbitoco.qzz.io`) && PathPrefix(`/payroll`)"
      - "traefik.http.routers.payroll-ms.entrypoints=websecure"
      - "traefik.http.routers.payroll-ms.tls.certresolver=letsencrypt"
      - "traefik.http.services.payroll-ms.loadbalancer.server.port=8000"

  # ── Leave Microservice ──────────────────────────────────────────────────────
  leave-ms:
    build:
      context: ./leave-ms
    networks:
      - dokploy-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: ${LEAVE_DB_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TALISMAN_FORCE_HTTPS: "false"
      FORCE_MIGRATE: ${FORCE_MIGRATE:-false}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.swarm.enable=false"
      - "traefik.http.routers.leave-ms.rule=Host(`hrms-api.whilmarbitoco.qzz.io`) && PathPrefix(`/leave`)"
      - "traefik.http.routers.leave-ms.entrypoints=websecure"
      - "traefik.http.routers.leave-ms.tls.certresolver=letsencrypt"
      - "traefik.http.services.leave-ms.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost}
    networks:
      - dokploy-network
    depends_on:
      auth-ms:
        condition: service_started
      employee-ms:
        condition: service_started
      payroll-ms:
        condition: service_started
      leave-ms:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped

volumes:
  rabbitmq_data:

networks:
  dokploy-network:
    external: true
