services:

  # ── RabbitMQ ───────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    networks:
      - dokploy-network
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Auth Microservice ───────────────────────────────────────────────────────
  auth-ms:
    build:
      context: ./auth-ms
    networks:
      - dokploy-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: ${AUTH_DB_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TALISMAN_FORCE_HTTPS: "false"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.hrms-auth.rule=Host(`hrms-api.whilmarbitoco.qzz.io`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.hrms-auth.entrypoints=websecure"
      - "traefik.http.routers.hrms-auth.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hrms-auth.service=hrms-auth-svc"
      - "traefik.http.services.hrms-auth-svc.loadbalancer.server.port=8000"

  # ── Employee Microservice ───────────────────────────────────────────────────
  employee-ms:
    build:
      context: ./employee-ms
    networks:
      - dokploy-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: ${EMPLOYEE_DB_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TALISMAN_FORCE_HTTPS: "false"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.hrms-employee.rule=Host(`hrms-api.whilmarbitoco.qzz.io`) && (PathPrefix(`/employees`) || PathPrefix(`/departments`) || PathPrefix(`/employee-roles`))"
      - "traefik.http.routers.hrms-employee.entrypoints=websecure"
      - "traefik.http.routers.hrms-employee.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hrms-employee.service=hrms-employee-svc"
      - "traefik.http.services.hrms-employee-svc.loadbalancer.server.port=8000"

  # ── Payroll Microservice ────────────────────────────────────────────────────
  payroll-ms:
    build:
      context: ./payroll-ms
    networks:
      - dokploy-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: ${PAYROLL_DB_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TALISMAN_FORCE_HTTPS: "false"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.hrms-payroll.rule=Host(`hrms-api.whilmarbitoco.qzz.io`) && PathPrefix(`/payroll`)"
      - "traefik.http.routers.hrms-payroll.entrypoints=websecure"
      - "traefik.http.routers.hrms-payroll.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hrms-payroll.service=hrms-payroll-svc"
      - "traefik.http.services.hrms-payroll-svc.loadbalancer.server.port=8000"

  # ── Leave Microservice ──────────────────────────────────────────────────────
  leave-ms:
    build:
      context: ./leave-ms
    networks:
      - dokploy-network
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: ${LEAVE_DB_URL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TALISMAN_FORCE_HTTPS: "false"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.hrms-leave.rule=Host(`hrms-api.whilmarbitoco.qzz.io`) && PathPrefix(`/leave`)"
      - "traefik.http.routers.hrms-leave.entrypoints=websecure"
      - "traefik.http.routers.hrms-leave.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hrms-leave.service=hrms-leave-svc"
      - "traefik.http.services.hrms-leave-svc.loadbalancer.server.port=8000"

volumes:
  rabbitmq_data:

networks:
  dokploy-network:
    external: true
